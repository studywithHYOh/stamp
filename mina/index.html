<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>참 잘했어효! 스탬프</title>
    <style>
        :root {
            --primary-color: #ff7675;
            --bg-color: #f9f9f9;
            --card-bg: #ffffff;
            --sub-text-color: #a4b0be;
            --point-color: #00b894;
        }

        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: clamp(10px, 3vw, 20px);
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        .coupon-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 850px;
            padding: clamp(20px, 5vw, 50px) clamp(15px, 4vw, 40px);
            border-radius: clamp(15px, 3vw, 30px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            text-align: center;
            border: 4px dashed var(--primary-color);
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
        }

        h1 {
            color: var(--primary-color);
            font-size: clamp(1.5rem, 5vw, 3rem);
            margin-bottom: 5px;
            line-height: 1.3;
        }

        .title-ja {
            color: var(--sub-text-color);
            font-size: clamp(0.7rem, 2.2vw, 1.2rem);
            margin-bottom: clamp(15px, 3vw, 25px);
            line-height: 1.4;
        }

        .desc-ko {
            color: #2d3436;
            font-size: clamp(0.85rem, 2.8vw, 1.5rem);
            margin-bottom: 5px;
            line-height: 1.5;
            font-weight: 500;
        }

        .desc-ja {
            color: var(--sub-text-color);
            font-size: clamp(0.65rem, 1.8vw, 1rem);
            margin-bottom: clamp(20px, 4vw, 40px);
            line-height: 1.5;
        }

        .stamp-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: clamp(8px, 2vw, 25px);
            margin-bottom: clamp(20px, 4vw, 50px);
        }

        .stamp-slot {
            aspect-ratio: 1 / 1;
            border: clamp(2px, 0.4vw, 3px) solid #dfe6e9;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(0.9rem, 3vw, 2.5rem);
            position: relative;
            background-color: #fff;
            color: #b2bec3;
            font-weight: bold;
        }

        .stamp-slot.active::after {
            content: attr(data-phrase);
            font-size: clamp(0.55rem, 1.6vw, 1.3rem);
            color: white;
            background-color: var(--primary-color);
            width: 90%;
            height: 90%;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            line-height: 1.3;
            font-weight: 900;
            transform: rotate(-10deg);
            box-shadow: 3px 3px 8px rgba(0,0,0,0.2);
            white-space: pre-wrap;
            word-break: keep-all;
            padding: clamp(4px, 1vw, 10px);
            box-sizing: border-box;
        }

        #congratsMessage {
            display: none;
            text-align: left;
            background-color: #f0fff4;
            border-left: 5px solid var(--point-color);
            padding: clamp(10px, 2vw, 15px) clamp(12px, 2.5vw, 20px);
            border-radius: 10px;
            color: #2d3436;
            font-weight: bold;
            font-size: clamp(0.8rem, 2.2vw, 1.1rem);
            margin-top: 10px;
            animation: slideUp 0.5s ease-out;
            line-height: 1.6;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer-controls {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: clamp(10px, 2vw, 20px);
        }

        .btn {
            border: 1px solid #b2bec3;
            color: #a4b0be;
            padding: clamp(4px, 1vw, 5px) clamp(8px, 1.5vw, 12px);
            border-radius: 10px;
            cursor: pointer;
            font-size: clamp(0.65rem, 1.5vw, 0.75rem);
            background: #f9f9f9;
        }

        .btn:hover { background-color: #eee; }

        /* 모바일 전용 추가 조정 */
        @media (max-width: 400px) {
            .stamp-slot.active::after {
                font-size: clamp(0.45rem, 2.8vw, 0.7rem);
            }
        }
    </style>
</head>
<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">

<div class="coupon-card">
    <h1>열공하는 여러분 멋져효!</h1>
    <div class="title-ja">一生懸命勉強している皆さん、素敵です！</div>

    <div class="desc-ko">
        10회 수업을 완료할 때마다 도장을 찍어드립니다.<br>
        도장 5개를 모두 받으면 <strong>50분 무료 수업</strong>을 드려요!
    </div>
    <div class="desc-ja">
        10回のレッスンを完了するたびにスタンプを差し上げます。<br>
        スタンプが5個たまると、<strong>50分間の無料レッスン</strong>をプレゼントします！
    </div>

    <div class="stamp-grid" id="stampGrid"></div>

    <div id="congratsMessage">
        🎉 축하합니다! 카페토크에서 50분 수업 쿠폰을 받으세요 :) <br>
        <span style="font-size: clamp(0.65rem, 1.8vw, 0.9rem); color: #636e72; font-weight: normal;">(おめでとうございます！カフェトークで50分無料レッスンクーポンを受け取ってください。)</span>
    </div>

    <div class="footer-controls">
        <button class="btn" onclick="adminStamp()">도장 찍기 (선생님)</button>
        <button class="btn" onclick="resetStamps()">초기화</button>
    </div>
</div>

<script>
    document.onkeydown = function(e) {
        if(e.keyCode == 123 || (e.ctrlKey && (e.keyCode == 85 || e.keyCode == 73 || e.keyCode == 74))) return false;
    };

    const totalStamps = 5;
    const grid = document.getElementById('stampGrid');
    const msgArea = document.getElementById('congratsMessage');
    const phrases = ["참 잘했어요", "내가 또 해냄", "제법 멋진 나", "아주 칭찬해", "최고예요!"];
    const ADMIN_PW = "2735";

    const urlParams = new URLSearchParams(window.location.search);
    let stampStatus = urlParams.get('s') ? urlParams.get('s').split('').map(v => v === '1') : Array(totalStamps).fill(false);

    function createGrid() {
        grid.innerHTML = '';
        stampStatus.forEach((isActive, index) => {
            const slot = document.createElement('div');
            slot.className = `stamp-slot ${isActive ? 'active' : ''}`;
            if (isActive) {
                slot.setAttribute('data-phrase', phrases[index]);
            } else {
                slot.textContent = index + 1;
            }
            grid.appendChild(slot);
        });

        if (stampStatus[4] === true) {
            msgArea.style.display = 'block';
        } else {
            msgArea.style.display = 'none';
        }
    }

    function adminStamp() {
        const pw = prompt("선생님 비밀번호:");
        if (pw !== ADMIN_PW) return alert("틀렸습니다.");
        const num = prompt("몇 번째 도장? (1~5)");
        const idx = parseInt(num) - 1;
        if (idx >= 0 && idx < totalStamps) {
            stampStatus[idx] = true;
            updateShareLink();
        }
    }

    function resetStamps() {
        const pw = prompt("비밀번호:");
        if (pw === ADMIN_PW) {
            if(confirm("초기화할까요?")) {
                stampStatus = Array(totalStamps).fill(false);
                updateShareLink();
            }
        }
    }

    function updateShareLink() {
        const s = stampStatus.map(v => v ? '1' : '0').join('');
        const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?s=' + s;
        window.history.pushState({path: newUrl}, '', newUrl);
        createGrid();
        alert("도장이 반영되었습니다. 주소창의 링크를 학생에게 보내주세요!");
    }

    createGrid();
</script>

</body>
</html>
